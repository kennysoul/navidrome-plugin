name: Build Navidrome Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sumusic-xml-sidecar

    env:
      GOTOOLCHAIN: local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false

      - name: Install TinyGo
        run: |
          wget -q https://github.com/tinygo-org/tinygo/releases/download/v0.36.0/tinygo0.36.0.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf tinygo0.36.0.linux-amd64.tar.gz
          echo "/usr/local/tinygo/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          go version
          tinygo version

      - name: Download Go dependencies
        run: go mod download

      - name: Build WASM plugin
        run: |
          tinygo build -o plugin.wasm -target wasi -scheduler none -no-debug ./...

      - name: Package plugin (.ndp)
        run: |
          cp ../manifest.json manifest.json 2>/dev/null || true
          zip -j sumusic-xml-sidecar.ndp plugin.wasm manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumusic-xml-sidecar
          path: sumusic-xml-sidecar/sumusic-xml-sidecar.ndp

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: sumusic-xml-sidecar/sumusic-xml-sidecar.ndp
